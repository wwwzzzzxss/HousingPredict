name: Sync to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch: # 👉 就是這一行！它會把「手動執行按鈕」召喚出來

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Sync to Google Drive via Rclone
        uses: wei/rclone@v1
        env:
          RCLONE_CONFIG_DRIVE_TYPE: drive
          RCLONE_CONFIG_DRIVE_SCOPE: drive
          # 使用您的個人專屬授權碼 JSON
          RCLONE_CONFIG_DRIVE_TOKEN: ${{ secrets.GDRIVE_CREDENTIALS }}
          
          # 空間容量算在您自己頭上
          RCLONE_DRIVE_UPLOAD_CUTOFF: "0"
          
          # 徹底封鎖 .git 歷史紀錄檔
          RCLONE_EXCLUDE: "/.git/**"
        with:
          args: sync . drive:${{ secrets.GDRIVE_FOLDER_ID }}
