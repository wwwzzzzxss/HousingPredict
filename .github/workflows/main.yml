name: Sync to Google Drive

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Rclone Config File
        run: |
          # 校正路徑，直接把設定檔建立在 Docker 容器對應的 /github/home 目錄下
          mkdir -p /home/runner/work/_temp/_github_home/.config/rclone
          cat << 'EOF' > /home/runner/work/_temp/_github_home/.config/rclone/rclone.conf
          [drive]
          type = drive
          scope = drive
          service_account_credentials = ${{ secrets.GDRIVE_CREDENTIALS }}
          EOF

      - name: Sync to Google Drive via Rclone
        uses: wei/rclone@v1
        with:
          args: sync . drive:${{ secrets.GDRIVE_FOLDER_ID }}
